source = { local = true }
cmd = ["duvet query -c implementation"]
report_output = false

# An unmatchable quote is a real error and must still fail the run
# (exit non-zero), but the run should report *every* unmatchable quote in one
# pass rather than aborting on the first — otherwise the user fixes one, re-runs,
# hits the next, and repeats.
#
# The quotes below each carry a one-character typo ("thinX"). That is close
# enough to *fuzzy*-match in the earlier reference-matching phase (so it does not
# abort there) but not *exactly*-match in is_annotation_covered — which is the
# code path that collects errors instead of aborting. Both errors must appear in the single run's output,
# deduped to one per annotation (each target is scored against two covering pools
# but a target-quote miss is the same failure from both).
[[file]]
path = ".duvet/config.toml"
contents = """
'$schema' = "https://awslabs.github.io/duvet/config/v0.4.0.json"

[[source]]
pattern = "src/**/*.rs"

[[specification]]
source = "spec.md"
"""

[[file]]
path = "src/first.rs"
contents = """
//= spec.md#section-1
//= type=spec
//# The system MUST do the first thinX.
fn first() {}
"""

[[file]]
path = "src/second.rs"
contents = """
//= spec.md#section-2
//= type=spec
//# The system MUST do the second thinX.
fn second() {}
"""

[[file]]
path = "spec.md"
contents = """
# Test Specification

## Section 1

The system MUST do the first thing.

## Section 2

The system MUST do the second thing.
"""
