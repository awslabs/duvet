source = { local = true }
cmd = ["duvet query -c coverage -r *.xml -f jacoco-xml --verbose"]
report_output = false

[[file]]
path = ".duvet/config.toml"
contents = """
'$schema' = "https://awslabs.github.io/duvet/config/v0.4.0.json"

[[source]]
pattern = "src/**/*.java"

[[specification]]
source = "spec.md"
"""

[[file]]
path = "spec.md"
contents = """
# V2 Coverage Model Test Specification

## Section 1

This MUST be implemented in the method body

## Section 2

This MUST define the keyring interface

## Section 3

This MUST declare the variable

## Section 4

This MUST not leak across methods

## Section 5

This MUST be stacked annotation A

## Section 6

This MUST be stacked annotation B

## Section 7

This MUST skip comments

## Section 8

This MUST handle unknown lines

"""

# Test 1: Annotation before method signature → Executed
# The annotation is above `public void foo() {`, JaCoCo reports the first
# statement inside the method as Hit. With v2, backward propagation from
# the executed statement reaches the method signature.
[[file]]
path = "src/main/java/com/example/MethodSigTest.java"
contents = """
package com.example;

public class MethodSigTest {

    //= spec.md#section-1
    //= type=implementation
    //# This MUST be implemented in the method body
    public void foo() {
        doX();
    }
}
"""

# Test 1 test annotation
[[file]]
path = "src/test/java/com/example/MethodSigTestTest.java"
contents = """
package com.example;

public class MethodSigTestTest {

    //= spec.md#section-1
    //= type=test
    //# This MUST be implemented in the method body
    public void testFoo() {
        new MethodSigTest().foo();
    }
}
"""

# Test 5+6: Stacked annotations across declaration → both Executed
[[file]]
path = "src/main/java/com/example/StackedTest.java"
contents = """
package com.example;

public class StackedTest {

    public void bar() {
        //= spec.md#section-5
        //= type=implementation
        //# This MUST be stacked annotation A
        //= spec.md#section-6
        //= type=implementation
        //# This MUST be stacked annotation B
        doXandY();
    }
}
"""

# Test 5+6 test annotations
[[file]]
path = "src/test/java/com/example/StackedTestTest.java"
contents = """
package com.example;

public class StackedTestTest {

    //= spec.md#section-5
    //= type=test
    //# This MUST be stacked annotation A
    public void testA() {
        new StackedTest().bar();
    }

    //= spec.md#section-6
    //= type=test
    //# This MUST be stacked annotation B
    public void testB() {
        new StackedTest().bar();
    }
}
"""

# Test 7: Comment between annotation and target → Executed
[[file]]
path = "src/main/java/com/example/CommentTest.java"
contents = """
package com.example;

public class CommentTest {

    public void baz() {
        //= spec.md#section-7
        //= type=implementation
        //# This MUST skip comments
        // This is a regular comment that should be skipped
        doZ();
    }
}
"""

# Test 7 test annotation
[[file]]
path = "src/test/java/com/example/CommentTestTest.java"
contents = """
package com.example;

public class CommentTestTest {

    //= spec.md#section-7
    //= type=test
    //# This MUST skip comments
    public void testBaz() {
        new CommentTest().baz();
    }
}
"""

