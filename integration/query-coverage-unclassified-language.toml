source = { local = true }
cmd = ["duvet query -c coverage -r cov.xml -f jacoco-xml"]
report_output = false

# JaCoCo is a JVM-wide format, so a report can name non-Java sources
# (Kotlin/Scala/Groovy) — or, as here, a `.rs` source. Those have no tree-sitter
# classifier, so they are scored by the *verified degraded path*
# (duvet_coverage::degraded): the annotation's target resolves to the nearest
# non-skippable line (line 4, `fn work() {}`), and coverage reports it Hit, so the
# implementation annotation is Executed. Lower fidelity than the classified model
# (forward-nearest governance, no scope propagation) but verified and honest — no
# unverified forward-walk, and no refusal.
[[file]]
path = ".duvet/config.toml"
contents = """
'$schema' = "https://awslabs.github.io/duvet/config/v0.4.0.json"

[[source]]
pattern = "src/**/*.rs"

[[specification]]
source = "spec.md"
"""

[[file]]
path = "src/Other.rs"
contents = """
//= spec.md#section-1
//= type=implementation
//# This MUST do X
fn work() {}
"""

[[file]]
path = "spec.md"
contents = """
# Test Specification

## Section 1

This MUST do X
"""

[[file]]
path = "cov.xml"
contents = """
<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<!DOCTYPE report PUBLIC "-//JACOCO//DTD Report 1.1//EN" "report.dtd">
<report name="X">
    <package name="src">
        <sourcefile name="Other.rs">
            <line nr="4" mi="0" ci="1" mb="0" cb="0"/>
        </sourcefile>
    </package>
</report>
"""
