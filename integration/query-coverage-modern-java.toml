source = { local = true }
cmd = ["duvet query -c coverage -r jacoco.xml -f jacoco-xml"]
report_output = false

# End-to-end coverage over MODERN Java constructs, pinned against a REAL JaCoCo
# report. Both the source and the `jacoco.xml` below were produced empirically:
# the source was compiled (javac --release 21) and run under the JaCoCo agent,
# and the XML is that run's verbatim output. This guards the classifier's
# handling of records, record methods, and switch arrow arms against genuine
# bytecode coverage rather than a hand-authored approximation.
#
# The annotations sit directly on the modern constructs, and the JaCoCo verdict
# lines up with the classifier's model:
#   - #circle-area   → impl in a RECORD method (line 14 HIT) + test → correlated ✓
#   - #classify-zero → impl in a SWITCH ARROW ARM block (line 33 HIT) + test → ✓
#   - #square-area   → impl in a record method (line 23 MISS) + a test that
#                      itself runs but never calls Square.area → FAILED correlation
# The failed #square-area correlation is what makes the run exit non-zero. The
# captured stderr shows the classifier resolving annotations that sit inside a
# record method and a switch arrow arm, with the verified model attributing the
# real bytecode hit/miss to each.
[[file]]
path = ".duvet/config.toml"
contents = """
'$schema' = "https://awslabs.github.io/duvet/config/v0.4.0.json"

[[source]]
pattern = "src/**/*.java"

[[specification]]
source = "spec.md"
"""

[[file]]
path = "spec.md"
contents = """
# Shapes Specification

## Circle area {#circle-area}

The area of a circle MUST be pi times the radius squared.

## Square area {#square-area}

The area of a square MUST be the side length squared.

## Classify zero {#classify-zero}

A value of zero MUST classify as "zero".
"""

[[file]]
path = "src/com/example/Shapes.java"
contents = """
package com.example;

public class Shapes {

    sealed interface Shape permits Circle, Square {
        double area();
    }

    record Circle(double r) implements Shape {
        public double area() {
            //= spec.md#circle-area
            //= type=implementation
            //# The area of a circle MUST be pi times the radius squared.
            return 3.14 * r * r;
        }
    }

    record Square(double s) implements Shape {
        public double area() {
            //= spec.md#square-area
            //= type=implementation
            //# The area of a square MUST be the side length squared.
            return s * s;
        }
    }

    static String classify(int n) {
        return switch (n) {
            case 0 -> {
                //= spec.md#classify-zero
                //= type=implementation
                //# A value of zero MUST classify as "zero".
                yield "zero";
            }
            default -> "many";
        };
    }

    public static double totalArea(Shape a) {
        return a.area();
    }
}
"""

[[file]]
path = "src/com/example/ShapesTest.java"
contents = """
package com.example;

public class ShapesTest {

    public static void main(String[] args) {
        //= spec.md#circle-area
        //= type=test
        //# The area of a circle MUST be pi times the radius squared.
        Shapes.Shape circle = new Shapes.Circle(2.0);
        System.out.println(Shapes.totalArea(circle));

        //= spec.md#classify-zero
        //= type=test
        //# A value of zero MUST classify as "zero".
        System.out.println(Shapes.classify(0));

        //= spec.md#square-area
        //= type=test
        //# The area of a square MUST be the side length squared.
        // This test is itself executed (it runs in main), but it never calls
        // Square.area — so the correlated implementation is NOT executed, and
        // the coverage check must report a failed correlation.
        System.out.println("square-area test ran but did not exercise the impl");
    }
}
"""

