on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  schedule:
    # run every morning at 10am Pacific Time
    - cron: '0 17 * * *'

name: ci

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: 1
  # Pin the nightly toolchain to prevent breakage.
  # This should be occasionally updated.
  RUST_NIGHTLY_TOOLCHAIN: nightly-2025-11-09

jobs:
  env:
    runs-on: ubuntu-latest
    outputs:
      rust-versions: ${{ steps.definitions.outputs.versions }}
      msrv: ${{ steps.definitions.outputs.msrv }}
    steps:
      - uses: actions/checkout@v6
      - name: Evaluate definitions
        id: definitions
        run: |
          rustup show active-toolchain
          export MSRV=$(rustup show active-toolchain | awk -F'-' '{print $1}')
          if [ -z "$MSRV" ]; then
            echo "Error: MSRV did not parse correctly"
            exit 1
          fi
          echo "msrv=$MSRV" >> "$GITHUB_OUTPUT"
          export RAW_VERSIONS="stable beta $RUST_NIGHTLY_TOOLCHAIN $MSRV"
          export VERSIONS=$(echo $RAW_VERSIONS | jq -scR 'rtrimstr("\n")|split(" ")|.')
          echo "versions=$VERSIONS" >> "$GITHUB_OUTPUT"

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install rustfmt toolchain
        run: |
          rustup toolchain install ${{ env.RUST_NIGHTLY_TOOLCHAIN }} --profile minimal --component rustfmt
          rustup override set ${{ env.RUST_NIGHTLY_TOOLCHAIN }}

      - name: Install clippy toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup override set stable

      - name: Run checks
        run: |
          cargo xtask checks --rustfmt-toolchain ${{ env.RUST_NIGHTLY_TOOLCHAIN }}

  udeps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install toolchain
        id: toolchain
        run: |
          rustup toolchain install ${{ env.RUST_NIGHTLY_TOOLCHAIN }} --profile minimal
          rustup override set ${{ env.RUST_NIGHTLY_TOOLCHAIN }}

      - uses: camshaft/rust-cache@v1

      - uses: camshaft/install@v1
        with:
          crate: cargo-udeps

      - name: Cache node_modules
        uses: actions/cache@v5.0.5
        continue-on-error: true
        with:
          path: duvet/www/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('duvet/www/package-lock.json') }}

      - name: Build script.js
        run: |
          cargo xtask build

      - name: Run cargo udeps
        run: cargo udeps --workspace --all-targets
        env:
          RUSTC_WRAPPER: ""

  test:
    runs-on: ${{ matrix.os }}
    needs: env
    strategy:
      matrix:
        rust: ${{ fromJson(needs.env.outputs.rust-versions) }}
        os: [ubuntu-latest, macOS-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install toolchain
        id: toolchain
        run: |
          rustup toolchain install ${{ matrix.rust }}
          rustup override set ${{ matrix.rust }}

      - uses: camshaft/rust-cache@v1
        with:
          key: ${{ matrix.target }}

      - name: Cache node_modules
        uses: actions/cache@v5.0.5
        continue-on-error: true
        with:
          path: duvet/www/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('duvet/www/package-lock.json') }}

      - name: Run tests
        run: |
          cargo xtask test

  verify: # verify the duvet-coverage Verus proofs
    name: Verify duvet-coverage proofs
    runs-on: ubuntu-latest
    env:
      # Verus release pinned for reproducibility. Bump when the matching
      # vstd version on crates.io advances; the corresponding Rust toolchain
      # is installed dynamically below by parsing the verus binary's
      # missing-toolchain error message.
      #
      # Releases live at https://github.com/verus-lang/verus/releases
      VERUS_VERSION: "0.2026.05.24.ecee80a"
    steps:
      - uses: actions/checkout@v6

      - name: Cache Verus binary
        id: cache-verus
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.verus
          key: verus-${{ env.VERUS_VERSION }}-x86-linux

      - name: Download Verus binary release
        if: steps.cache-verus.outputs.cache-hit != 'true'
        run: |
          curl -L --fail \
            -o verus.zip \
            "https://github.com/verus-lang/verus/releases/download/release%2F${VERUS_VERSION}/verus-${VERUS_VERSION}-x86-linux.zip"
          unzip -q verus.zip
          mv verus-x86-linux .verus

      - name: Add Verus to PATH
        run: echo "${{ github.workspace }}/.verus" >> "$GITHUB_PATH"

      - name: Install Rust toolchain required by Verus
        run: |
          # Verus pins a specific Rust toolchain per release. The first time
          # `verus` is invoked it prints the exact rustup command needed.
          # Capture verus output to a variable, then parse — the previous
          # `verus 2>&1 || true | grep ...` was incorrect bash precedence:
          # `|` binds tighter than `||`, so the grep was attached to the
          # `true` branch and never saw verus's output.
          verus_output=$(verus 2>&1 || true)
          INSTALL_CMD=$(echo "$verus_output" \
            | grep -E '^\s*rustup install ' \
            | head -1 \
            | xargs)
          if [ -n "$INSTALL_CMD" ]; then
            echo "Running: $INSTALL_CMD"
            eval "$INSTALL_CMD"
          else
            echo "No rustup install hint from verus output;" >&2
            echo "the required toolchain may already be installed." >&2
            echo "----- verus output -----"
            echo "$verus_output"
            echo "------------------------"
          fi

      - name: Verify duvet-coverage proofs
        run: cargo verus build -p duvet-coverage

  action: # make sure the action works on a clean machine without building
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./
      - name: duvet help
        run: duvet --help
      - name: duvet report
        run: duvet report
