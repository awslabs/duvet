on:
  push:
    tags:
      - 'v*'

name: release

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --target ${{ matrix.target }}
          rustup override set stable

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Cache node_modules
        uses: actions/cache@v5.0.3
        continue-on-error: true
        with:
          path: duvet/www/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('duvet/www/package-lock.json') }}

      - name: Build www assets
        run: cargo xtask build

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release -p duvet --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release -p duvet --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DIR="duvet-${TAG}-${{ matrix.target }}"
          mkdir "$DIR"
          cp "target/${{ matrix.target }}/release/duvet" "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace '^refs/tags/', ''
          $dir = "duvet-${tag}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dir
          Copy-Item "target/${{ matrix.target }}/release/duvet.exe" "$dir/"
          Compress-Archive -Path "$dir" -DestinationPath "${dir}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: duvet-${{ matrix.target }}
          path: duvet-*-${{ matrix.target }}.*

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
